<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>band-networks</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; background: #fafafa; }
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px 16px; background: #fff; border-bottom: 1px solid #ddd;
      display: flex; gap: 16px; align-items: center; z-index: 10; flex-wrap: wrap;
    }
    #toolbar h1 { margin: 0; font-size: 14px; font-weight: 600; }
    #toolbar .group { display: flex; gap: 4px; align-items: center; }
    #toolbar .group .label { font-size: 11px; color: #888; margin-right: 4px; }
    #toolbar button {
      padding: 5px 10px; font-size: 12px; cursor: pointer;
      background: #fff; border: 1px solid #ccc; border-radius: 3px;
    }
    #toolbar button.active { background: #333; color: #fff; border-color: #333; }
    #toolbar button:disabled { opacity: 0.4; cursor: not-allowed; }
    #toolbar select {
      padding: 5px 8px; font-size: 12px; cursor: pointer;
      background: #fff; border: 1px solid #ccc; border-radius: 3px;
    }
    #toolbar .stats { margin-left: auto; font-size: 12px; color: #666; }
    svg { display: block; }
    .link { stroke-opacity: 0.5; }
    .link.member { stroke: #888; }
    .link.supporting { stroke: #c8a200; stroke-dasharray: 3,2; }
    .link.projection { stroke: #888; }
    .node-band { fill: steelblue; stroke: #fff; stroke-width: 1.5px; cursor: pointer; }
    .node-musician { fill: orange; stroke: #fff; stroke-width: 1px; cursor: pointer; }
    .node-band.focused { stroke: #d4351c; stroke-width: 3px; }
    .node-musician.focused { stroke: #d4351c; stroke-width: 2px; }
    .label-band { font-size: 11px; font-weight: 600; pointer-events: none; }
    .label-musician { font-size: 9px; fill: #555; pointer-events: none; }
    .tooltip {
      position: absolute; padding: 6px 10px; background: rgba(0,0,0,0.8);
      color: #fff; font-size: 12px; border-radius: 3px; pointer-events: none;
      opacity: 0; transition: opacity 0.15s;
    }

    /* Build modal */
    #build-modal { position: fixed; inset: 0; z-index: 100; }
    #build-modal.hidden { display: none; }
    .modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
    .modal-card {
      position: relative; max-width: 480px; width: 90vw;
      margin: 60px auto 0; background: #fff; border-radius: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2); padding: 20px 24px;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .modal-header h2 { margin: 0; font-size: 16px; }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      font-size: 24px; line-height: 1; padding: 0; color: #888;
    }
    .icon-btn:hover { color: #333; }
    #search-input {
      width: 100%; box-sizing: border-box; padding: 8px 10px;
      font-size: 14px; border: 1px solid #ccc; border-radius: 3px;
      margin-bottom: 12px;
    }
    #search-results { list-style: none; padding: 0; margin: 0; max-height: 320px; overflow-y: auto; }
    #search-results li {
      padding: 8px 10px; border-radius: 3px; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    #search-results li:hover { background: #f0f0f0; }
    #search-results li.placeholder { cursor: default; }
    #search-results li.placeholder:hover { background: transparent; }
    .result-main { flex: 1; min-width: 0; }
    .result-name { font-weight: 600; font-size: 13px; }
    .result-meta { font-size: 11px; color: #888; }
    .result-badge {
      font-size: 11px; padding: 2px 6px; border-radius: 10px;
      background: #d4f0d4; color: #2d5a2d; white-space: nowrap;
    }
    .depth-row { display: flex; gap: 6px; align-items: center; margin: 16px 0 8px; }
    .depth-row button {
      padding: 5px 10px; font-size: 12px; cursor: pointer;
      background: #fff; border: 1px solid #ccc; border-radius: 3px;
    }
    .depth-row button.active { background: #333; color: #fff; border-color: #333; }
    .warning-text {
      font-size: 12px; color: #555; line-height: 1.4;
      background: #fffbe6; border: 1px solid #ffe58f;
      border-radius: 3px; padding: 8px 10px;
    }
    .lastfm-note { font-size: 11px; color: #2d5a2d; margin-top: 6px; }
    .error-text {
      font-size: 12px; color: #b3261e; padding: 8px 10px;
      background: #fff5f5; border: 1px solid #f5c6cb;
      border-radius: 3px;
    }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .modal-actions button {
      padding: 6px 14px; font-size: 12px; cursor: pointer;
      background: #fff; border: 1px solid #ccc; border-radius: 3px;
    }
    .modal-actions button.primary { background: #333; color: #fff; border-color: #333; }
    .modal-actions button:disabled { opacity: 0.4; cursor: not-allowed; }
    #selected-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    #selected-meta { font-size: 11px; color: #888; margin-bottom: 4px; }
    #progress-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    #progress-detail { font-size: 12px; color: #555; margin-bottom: 12px; min-height: 18px; }
    .spinner {
      width: 22px; height: 22px;
      border: 3px solid #eee; border-top-color: #333; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 8px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="toolbar">
    <h1 id="title">band-networks</h1>
    <div class="group">
      <span class="label">Scene:</span>
      <select id="scene-select"></select>
      <button id="add-band-btn" title="Build a network for a single band">+ Build new</button>
    </div>
    <div class="group">
      <span class="label">View:</span>
      <button data-mode="connectors" class="active">Connectors</button>
      <button data-mode="full">Full</button>
      <button data-mode="bands">Band-only</button>
    </div>
    <div class="group">
      <span class="label">Size by:</span>
      <button data-size="centrality" class="active">Centrality</button>
      <button data-size="popularity" id="size-popularity" disabled title="Run fetch_popularity.py to enable">Popularity</button>
    </div>
    <span class="stats" id="stats"></span>
  </div>
  <div class="tooltip" id="tooltip"></div>
  <svg></svg>

  <div id="build-modal" class="hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modal-title">Build a band-network</h2>
        <button id="modal-close" class="icon-btn" aria-label="Close">×</button>
      </div>
      <div id="modal-search-stage">
        <input id="search-input" type="text" placeholder="Search MusicBrainz for a band…" autocomplete="off"/>
        <ul id="search-results"></ul>
      </div>
      <div id="modal-config-stage" class="hidden">
        <div id="selected-name"></div>
        <div id="selected-meta"></div>
        <div class="depth-row">
          <span class="label">Depth:</span>
          <button data-depth="1" class="active">1</button>
          <button data-depth="2">2</button>
        </div>
        <div id="depth-warning" class="warning-text"></div>
        <div id="lastfm-note" class="lastfm-note hidden">+ Last.fm popularity will be fetched after the crawl.</div>
        <div class="modal-actions">
          <button id="back-to-search">← Back</button>
          <button id="build-btn" class="primary">Build</button>
        </div>
      </div>
      <div id="modal-progress-stage" class="hidden">
        <div id="progress-title"></div>
        <div id="progress-detail"></div>
        <div id="progress-spinner" class="spinner"></div>
        <div id="progress-error" class="error-text hidden"></div>
        <div class="modal-actions">
          <button id="progress-close">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const svg = d3.select("svg")
      .attr("width", window.innerWidth)
      .attr("height", window.innerHeight - 50);
    const tooltip = d3.select("#tooltip");
    const stats = d3.select("#stats");

    let RAW = null;
    let SCENES = [];
    let CONFIG = { lastfm_enabled: false };
    let currentSceneId = null;

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
      ));
    }
    let mode = "connectors";
    let sizeMode = "centrality";
    let focusedId = null;
    let centralityScale = () => 12;
    let popularityScale = () => 12;
    let simulation = null;
    let nodeSel, linkSel, labelSel, viewG;

    const zoom = d3.zoom()
      .scaleExtent([0.1, 8])
      .on("zoom", (event) => {
        if (viewG) viewG.attr("transform", event.transform);
      });
    svg.call(zoom).on("dblclick.zoom", null);

    async function init() {
      try {
        const [scenesRes, configRes] = await Promise.all([
          fetch("/api/scenes"),
          fetch("/api/config"),
        ]);
        SCENES = (await scenesRes.json()).scenes || [];
        CONFIG = await configRes.json();
      } catch (err) {
        console.error("Failed to fetch initial state", err);
      }
      populateSceneDropdown();
      d3.select("#lastfm-note").classed("hidden", !CONFIG.lastfm_enabled);
      const initial = chooseInitialScene();
      if (initial) await loadScene(initial.id);
    }

    function populateSceneDropdown() {
      const sel = d3.select("#scene-select");
      sel.selectAll("option").remove();
      for (const s of SCENES) {
        sel.append("option").attr("value", s.id).text(s.name);
      }
      sel.on("change", function () { loadScene(this.value); });
    }

    function chooseInitialScene() {
      if (!SCENES.length) return null;
      const want = new URLSearchParams(location.search).get("scene");
      return (want && SCENES.find(s => s.id === want)) || SCENES[0];
    }

    async function loadScene(sceneId) {
      currentSceneId = sceneId;
      focusedId = null;

      // Reset popularity toggle; loadScene re-enables it if popularity data exists.
      d3.select("#size-popularity")
        .attr("disabled", true)
        .attr("title", "Run fetch_popularity.py to enable");
      if (sizeMode === "popularity") {
        sizeMode = "centrality";
        d3.selectAll("#toolbar button[data-size]").classed("active", false);
        d3.select('button[data-size="centrality"]').classed("active", true);
      }

      d3.select("#scene-select").property("value", sceneId);
      const url = new URL(location.href);
      url.searchParams.set("scene", sceneId);
      history.replaceState(null, "", url);

      const meta = SCENES.find(s => s.id === sceneId);
      if (meta) {
        d3.select("#title").text(meta.name);
        document.title = `${meta.name} · band-networks`;
      }

      const [data, pop] = await Promise.all([
        d3.json(`data/${sceneId}/network.json`),
        d3.json(`data/${sceneId}/popularity.json`).catch(() => null),
      ]);
      // Guard against rapid switches: if a newer scene is now active, drop these results.
      if (currentSceneId !== sceneId) return;

      RAW = data;
      annotateBandImportance(RAW);
      if (pop) {
        for (const n of RAW.nodes) {
          if (n.type === "band" && pop[n.id]) {
            n.popularity = pop[n.id].listeners || 0;
          }
        }
        d3.select("#size-popularity").attr("disabled", null).attr("title", null);
      }
      setupScales();
      render();
    }

    // ---- Build modal: search MusicBrainz, kick off a single-band crawl ----
    let buildState = { selected: null, depth: 1, jobId: null, pollTimer: null };
    let searchTimeout = null;
    let latestSearchQuery = "";

    function openBuildModal() {
      buildState = { selected: null, depth: 1, jobId: null, pollTimer: null };
      d3.select("#search-input").property("value", "");
      d3.select("#search-results").selectAll("*").remove();
      showStage("search");
      d3.select("#build-modal").classed("hidden", false);
      setTimeout(() => document.getElementById("search-input").focus(), 0);
    }

    function closeBuildModal() {
      if (buildState.pollTimer) {
        clearTimeout(buildState.pollTimer);
        buildState.pollTimer = null;
      }
      // Abandon any in-flight polling: pollBuild re-checks jobId after each await.
      buildState.jobId = null;
      d3.select("#build-modal").classed("hidden", true);
    }

    function showStage(name) {
      for (const s of ["search", "config", "progress"]) {
        d3.select(`#modal-${s}-stage`).classed("hidden", s !== name);
      }
    }

    function onSearchInput(value) {
      clearTimeout(searchTimeout);
      const q = value.trim();
      if (q.length < 2) {
        d3.select("#search-results").selectAll("*").remove();
        return;
      }
      searchTimeout = setTimeout(() => doSearch(q), 300);
    }

    async function doSearch(q) {
      latestSearchQuery = q;
      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&limit=8`);
        if (latestSearchQuery !== q) return;  // newer query in flight
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (latestSearchQuery !== q) return;
        renderSearchResults(data.results || []);
      } catch (err) {
        if (latestSearchQuery !== q) return;
        const list = d3.select("#search-results");
        list.selectAll("*").remove();
        list.append("li").attr("class", "placeholder error-text").text(`Search failed: ${err.message}`);
      }
    }

    function renderSearchResults(results) {
      const list = d3.select("#search-results");
      list.selectAll("*").remove();
      if (!results.length) {
        list.append("li")
          .attr("class", "placeholder")
          .style("color", "#888").style("padding", "8px 10px")
          .text("No matches.");
        return;
      }
      for (const r of results) {
        const existing = SCENES.find(s => s.kind === "single-band" && s.mbid === r.mbid);
        const li = list.append("li").on("click", () => onResultClick(r, existing));
        const main = li.append("div").attr("class", "result-main");
        main.append("div").attr("class", "result-name").text(r.name);
        const metaParts = [r.type, r.country, r.disambiguation].filter(Boolean);
        if (metaParts.length) {
          main.append("div").attr("class", "result-meta").text(metaParts.join(" · "));
        }
        if (existing) {
          li.append("span").attr("class", "result-badge")
            .text(`✓ already built (depth ${existing.depth ?? "?"})`);
        }
      }
    }

    async function onResultClick(result, existing) {
      if (existing) {
        closeBuildModal();
        await loadScene(existing.id);
        return;
      }
      buildState.selected = result;
      d3.select("#selected-name").text(result.name);
      const metaParts = [result.type, result.country, result.disambiguation].filter(Boolean);
      d3.select("#selected-meta").text(metaParts.join(" · "));
      setDepth(1);
      showStage("config");
    }

    function setDepth(d) {
      buildState.depth = d;
      d3.selectAll('.depth-row button[data-depth]').classed("active", function () {
        return Number(this.dataset.depth) === d;
      });
      const warning = d === 2
        ? "Depth 2 also expands those second-tier bands and their members. Can take several minutes, much longer for prolific artists. Re-runs are faster (cached)."
        : "Depth 1 covers the seed band, every other band each of its members ever played in, and the connecting musicians. Typically under a minute; longer for prolific artists.";
      d3.select("#depth-warning").text(warning);
    }

    async function startBuild() {
      if (!buildState.selected) return;
      showStage("progress");
      d3.select("#progress-title").text(`Building network for ${buildState.selected.name} (depth ${buildState.depth})…`);
      d3.select("#progress-detail").text("Queued.");
      d3.select("#progress-error").classed("hidden", true).text("");
      d3.select("#progress-spinner").classed("hidden", false);
      d3.select("#progress-close").text("Cancel");

      try {
        const res = await fetch("/api/build", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: buildState.selected.name,
            mbid: buildState.selected.mbid,
            depth: buildState.depth,
          }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data.status === "exists") {
          await refreshScenes();
          closeBuildModal();
          await loadScene(data.scene_id);
          return;
        }
        buildState.jobId = data.job_id;
        pollBuild();
      } catch (err) {
        showBuildError(`Failed to start build: ${err.message}`);
      }
    }

    async function pollBuild() {
      const myJobId = buildState.jobId;
      if (!myJobId) return;
      try {
        const res = await fetch(`/api/build/${myJobId}`);
        if (myJobId !== buildState.jobId) return;  // user closed modal; abandon
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const job = await res.json();
        if (myJobId !== buildState.jobId) return;  // re-check after second await
        if (job.state === "done") {
          d3.select("#progress-detail").text("Done!");
          d3.select("#progress-spinner").classed("hidden", true);
          if (job.popularity_warning) {
            console.warn("Popularity fetch warning:", job.popularity_warning);
          }
          await refreshScenes();
          if (myJobId !== buildState.jobId) return;
          closeBuildModal();
          await loadScene(job.scene_id);
          return;
        }
        if (job.state === "error") {
          showBuildError(job.error || "Unknown error");
          return;
        }
        if (job.progress) {
          const p = job.progress;
          let detail;
          if (job.phase === "lastfm") {
            detail = `Last.fm popularity: ${p.current} (${p.done}/${p.total})`;
          } else {
            detail = `MusicBrainz: ${p.current} (depth ${p.depth}) — ${p.bands_done} bands, ${p.musicians_done} musicians so far`;
          }
          d3.select("#progress-detail").text(detail);
        } else {
          d3.select("#progress-detail").text(job.state === "running" ? "Starting…" : "Queued.");
        }
        buildState.pollTimer = setTimeout(pollBuild, 1000);
      } catch (err) {
        if (myJobId !== buildState.jobId) return;  // closing also throws AbortError sometimes
        showBuildError(`Lost connection: ${err.message}`);
      }
    }

    function showBuildError(msg) {
      d3.select("#progress-error").classed("hidden", false).text(msg);
      d3.select("#progress-spinner").classed("hidden", true);
      d3.select("#progress-close").text("Close");
    }

    async function refreshScenes() {
      try {
        const res = await fetch("/api/scenes");
        SCENES = (await res.json()).scenes || [];
        populateSceneDropdown();
        if (currentSceneId) d3.select("#scene-select").property("value", currentSceneId);
      } catch (err) {
        console.error("refresh scenes failed", err);
      }
    }

    d3.select("#add-band-btn").on("click", openBuildModal);
    d3.select("#modal-close").on("click", closeBuildModal);
    d3.select(".modal-backdrop").on("click", closeBuildModal);
    d3.select("#search-input").on("input", function () { onSearchInput(this.value); });
    d3.select("#back-to-search").on("click", () => showStage("search"));
    d3.selectAll('.depth-row button[data-depth]').on("click", function () {
      setDepth(Number(this.dataset.depth));
    });
    d3.select("#build-btn").on("click", startBuild);
    d3.select("#progress-close").on("click", closeBuildModal);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !document.getElementById("build-modal").classList.contains("hidden")) {
        closeBuildModal();
      }
    });

    init();

    function annotateBandImportance(graph) {
      const musicianToBands = new Map();
      for (const e of graph.edges) {
        if (!musicianToBands.has(e.source)) musicianToBands.set(e.source, []);
        musicianToBands.get(e.source).push(e.target);
      }
      const score = new Map();
      for (const bs of musicianToBands.values()) {
        for (let i = 0; i < bs.length; i++) {
          for (let j = i + 1; j < bs.length; j++) {
            score.set(bs[i], (score.get(bs[i]) || 0) + 1);
            score.set(bs[j], (score.get(bs[j]) || 0) + 1);
          }
        }
      }
      for (const n of graph.nodes) {
        if (n.type === "band") n.importance = score.get(n.id) || 0;
      }
    }

    function setupScales() {
      const bands = RAW.nodes.filter(n => n.type === "band");
      const maxImp = d3.max(bands, n => n.importance) || 1;
      centralityScale = d3.scaleSqrt().domain([0, maxImp]).range([6, 26]);
      const maxPop = d3.max(bands, n => n.popularity || 0) || 1;
      // log scale because listener counts are extremely skewed
      popularityScale = d3.scaleLog().domain([1, maxPop]).range([6, 26]).clamp(true);
    }

    function bandRadius(d) {
      if (sizeMode === "popularity") {
        return popularityScale(Math.max(1, d.popularity || 1));
      }
      return centralityScale(d.importance || 0);
    }

    d3.selectAll("#toolbar button[data-mode]").on("click", function () {
      mode = this.dataset.mode;
      d3.selectAll("#toolbar button[data-mode]").classed("active", false);
      d3.select(this).classed("active", true);
      focusedId = null;
      render();
    });

    d3.selectAll("#toolbar button[data-size]").on("click", function () {
      if (this.disabled) return;
      sizeMode = this.dataset.size;
      d3.selectAll("#toolbar button[data-size]").classed("active", false);
      d3.select(this).classed("active", true);
      applySizes();
    });

    function applySizes() {
      if (!nodeSel) return;
      nodeSel.filter(d => d.type === "band").attr("r", d => bandRadius(d));
      labelSel.filter(d => d.type === "band")
        .attr("dy", d => bandRadius(d) + 12)
        .style("font-size", d => Math.max(10, Math.min(16, 9 + bandRadius(d) * 0.25)) + "px");
      simulation.force("collide", d3.forceCollide().radius(d => d.type === "band" ? bandRadius(d) + 4 : 6));
      simulation.alpha(0.2).restart();
    }

    function buildView() {
      const bandNodes = RAW.nodes.filter(n => n.type === "band").map(n => ({ ...n }));
      const musicianNodes = RAW.nodes.filter(n => n.type === "musician").map(n => ({ ...n }));

      if (mode === "full") {
        return { nodes: [...bandNodes, ...musicianNodes], links: RAW.edges.map(e => ({ ...e })) };
      }
      if (mode === "connectors") {
        const connectors = musicianNodes.filter(n => n.band_count >= 2);
        const ids = new Set(connectors.map(n => n.id));
        const links = RAW.edges.filter(e => ids.has(e.source)).map(e => ({ ...e }));
        return { nodes: [...bandNodes, ...connectors], links };
      }
      // bands: project edges between bands sharing musicians.
      const musicianToBands = new Map();
      for (const e of RAW.edges) {
        if (!musicianToBands.has(e.source)) musicianToBands.set(e.source, []);
        musicianToBands.get(e.source).push(e.target);
      }
      const pairWeight = new Map();
      for (const bs of musicianToBands.values()) {
        for (let i = 0; i < bs.length; i++) {
          for (let j = i + 1; j < bs.length; j++) {
            const [a, b] = [bs[i], bs[j]].sort();
            const k = `${a}|${b}`;
            pairWeight.set(k, (pairWeight.get(k) || 0) + 1);
          }
        }
      }
      const links = [];
      for (const [k, w] of pairWeight) {
        const [source, target] = k.split("|");
        links.push({ source, target, weight: w, kind: "projection" });
      }
      return { nodes: bandNodes, links };
    }

    // Build the ego subgraph (depth 2 for bipartite, 1 for band-only) of the focused node.
    function buildFocusedView() {
      const { nodes: allNodes, links: allLinks } = buildView();
      const adj = new Map();
      for (const l of allLinks) {
        const s = l.source.id || l.source;
        const t = l.target.id || l.target;
        if (!adj.has(s)) adj.set(s, []);
        if (!adj.has(t)) adj.set(t, []);
        adj.get(s).push(t);
        adj.get(t).push(s);
      }
      const depth = mode === "bands" ? 1 : 2;
      const visited = new Set([focusedId]);
      let frontier = new Set([focusedId]);
      for (let d = 0; d < depth; d++) {
        const next = new Set();
        for (const id of frontier) {
          for (const nb of (adj.get(id) || [])) {
            if (!visited.has(nb)) { visited.add(nb); next.add(nb); }
          }
        }
        frontier = next;
      }
      const nodes = allNodes.filter(n => visited.has(n.id));
      const links = allLinks.filter(l => {
        const s = l.source.id || l.source;
        const t = l.target.id || l.target;
        return visited.has(s) && visited.has(t);
      });
      return { nodes, links };
    }

    function render() {
      const { nodes, links } = focusedId ? buildFocusedView() : buildView();
      const focusSuffix = focusedId
        ? ` · focused on ${nodes.find(n => n.id === focusedId)?.name || ""}`
        : "";
      stats.text(`${mode} · ${sizeMode} · ${nodes.length} nodes · ${links.length} edges${focusSuffix}`);

      svg.selectAll("*").remove();
      if (simulation) simulation.stop();

      viewG = svg.append("g").attr("class", "zoom-target");
      svg.call(zoom.transform, d3.zoomIdentity);

      const w = window.innerWidth;
      const h = window.innerHeight - 50;
      const linkDistance = mode === "bands" ? 90 : 60;
      const charge = mode === "full" ? -80 : -150;

      simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(linkDistance))
        .force("charge", d3.forceManyBody().strength(charge))
        .force("center", d3.forceCenter(w / 2, h / 2))
        .force("collide", d3.forceCollide().radius(d => d.type === "band" ? bandRadius(d) + 4 : 6));

      linkSel = viewG.append("g").selectAll("line")
        .data(links).enter().append("line")
        .attr("class", d => "link " + (d.kind === "projection" ? "projection" : (d.role || "member")))
        .attr("stroke-width", d => d.weight ? Math.sqrt(d.weight) * 1.5 : 1);

      nodeSel = viewG.append("g").selectAll("circle")
        .data(nodes).enter().append("circle")
        .attr("class", d => {
          const base = d.type === "band" ? "node-band" : "node-musician";
          return d.id === focusedId ? `${base} focused` : base;
        })
        .attr("r", d => d.type === "band" ? bandRadius(d) : 4)
        .on("mouseover", (event, d) => {
          let extra = d.type === "band"
            ? `<span style="color:#aaa">band</span>`
            : `<span style="color:#aaa">${d.band_count} band${d.band_count===1?'':'s'}</span>`;
          if (d.type === "band" && d.popularity) {
            extra += ` <span style="color:#aaa">· ${d.popularity.toLocaleString()} listeners</span>`;
          }
          tooltip.style("opacity", 1).html(`<b>${escapeHtml(d.name)}</b> ${extra}`);
        })
        .on("mousemove", event => {
          tooltip.style("left", (event.pageX + 12) + "px")
                 .style("top", (event.pageY + 12) + "px");
        })
        .on("mouseout", () => tooltip.style("opacity", 0))
        .on("click", (event, d) => {
          event.stopPropagation();
          focusedId = (focusedId === d.id) ? null : d.id;
          render();
        })
        .call(d3.drag()
          .on("start", (event, d) => {
            if (event.sourceEvent) event.sourceEvent.stopPropagation();
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
          })
          .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
          .on("end", (event, d) => {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null; d.fy = null;
          }));

      labelSel = viewG.append("g").selectAll("text")
        .data(nodes).enter().append("text")
        .attr("class", d => d.type === "band" ? "label-band" : "label-musician")
        .attr("dy", d => d.type === "band" ? bandRadius(d) + 12 : 14)
        .attr("text-anchor", "middle")
        .style("font-size", d => d.type === "band" ? Math.max(10, Math.min(16, 9 + bandRadius(d) * 0.25)) + "px" : null)
        .text(d => d.name);

      simulation.on("tick", () => {
        linkSel
          .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
        nodeSel.attr("cx", d => d.x).attr("cy", d => d.y);
        labelSel.attr("x", d => d.x).attr("y", d => d.y);
      });
    }

    // Click on empty SVG background clears focus.
    svg.on("click", () => {
      if (focusedId) { focusedId = null; render(); }
    });

    window.addEventListener("resize", () => {
      const w = window.innerWidth;
      const h = window.innerHeight - 50;
      svg.attr("width", w).attr("height", h);
      if (simulation) {
        simulation.force("center", d3.forceCenter(w / 2, h / 2));
        simulation.alpha(0.3).restart();
      }
    });
  </script>
</body>
</html>
