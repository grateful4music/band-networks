<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Seattle Grunge Band Network</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; background: #fafafa; }
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px 16px; background: #fff; border-bottom: 1px solid #ddd;
      display: flex; gap: 16px; align-items: center; z-index: 10; flex-wrap: wrap;
    }
    #toolbar h1 { margin: 0; font-size: 14px; font-weight: 600; }
    #toolbar .group { display: flex; gap: 4px; align-items: center; }
    #toolbar .group .label { font-size: 11px; color: #888; margin-right: 4px; }
    #toolbar button {
      padding: 5px 10px; font-size: 12px; cursor: pointer;
      background: #fff; border: 1px solid #ccc; border-radius: 3px;
    }
    #toolbar button.active { background: #333; color: #fff; border-color: #333; }
    #toolbar button:disabled { opacity: 0.4; cursor: not-allowed; }
    #toolbar .stats { margin-left: auto; font-size: 12px; color: #666; }
    svg { display: block; }
    .link { stroke-opacity: 0.5; transition: opacity 0.2s; }
    .link.member { stroke: #888; }
    .link.supporting { stroke: #c8a200; stroke-dasharray: 3,2; }
    .link.projection { stroke: #888; }
    .link.dimmed { opacity: 0.04; }
    .node-band { fill: steelblue; stroke: #fff; stroke-width: 1.5px; cursor: pointer; transition: opacity 0.2s; }
    .node-musician { fill: orange; stroke: #fff; stroke-width: 1px; cursor: pointer; transition: opacity 0.2s; }
    .node-band.dimmed, .node-musician.dimmed { opacity: 0.1; }
    .node-band.focused { stroke: #d4351c; stroke-width: 3px; }
    .node-musician.focused { stroke: #d4351c; stroke-width: 2px; }
    .label-band { font-size: 11px; font-weight: 600; pointer-events: none; transition: opacity 0.2s; }
    .label-musician { font-size: 9px; fill: #555; pointer-events: none; transition: opacity 0.2s; }
    .label-band.dimmed, .label-musician.dimmed { opacity: 0.1; }
    .tooltip {
      position: absolute; padding: 6px 10px; background: rgba(0,0,0,0.8);
      color: #fff; font-size: 12px; border-radius: 3px; pointer-events: none;
      opacity: 0; transition: opacity 0.15s;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <h1>Seattle Grunge Band Network</h1>
    <div class="group">
      <span class="label">View:</span>
      <button data-mode="connectors" class="active">Connectors</button>
      <button data-mode="full">Full</button>
      <button data-mode="bands">Band-only</button>
    </div>
    <div class="group">
      <span class="label">Size by:</span>
      <button data-size="centrality" class="active">Centrality</button>
      <button data-size="popularity" id="size-popularity" disabled title="Run fetch_popularity.py to enable">Popularity</button>
    </div>
    <span class="stats" id="stats"></span>
  </div>
  <div class="tooltip" id="tooltip"></div>
  <svg></svg>

  <script>
    const width = window.innerWidth;
    const height = window.innerHeight - 50;
    const svg = d3.select("svg").attr("width", width).attr("height", height);
    const tooltip = d3.select("#tooltip");
    const stats = d3.select("#stats");

    let RAW = null;
    let mode = "connectors";
    let sizeMode = "centrality";
    let focusedId = null;
    let centralityScale = () => 12;
    let popularityScale = () => 12;
    let simulation = null;
    let nodeSel, linkSel, labelSel, viewG;

    const zoom = d3.zoom()
      .scaleExtent([0.1, 8])
      .on("zoom", (event) => {
        if (viewG) viewG.attr("transform", event.transform);
      });
    svg.call(zoom).on("dblclick.zoom", null);

    Promise.all([
      d3.json("bands_network.json"),
      d3.json("popularity.json").catch(() => null),
    ]).then(([data, pop]) => {
      RAW = data;
      annotateBandImportance(RAW);
      if (pop) {
        for (const n of RAW.nodes) {
          if (n.type === "band" && pop[n.id]) {
            n.popularity = pop[n.id].listeners || 0;
          }
        }
        d3.select("#size-popularity").attr("disabled", null).attr("title", null);
      }
      setupScales();
      render();
    });

    function annotateBandImportance(graph) {
      const musicianToBands = new Map();
      for (const e of graph.edges) {
        if (!musicianToBands.has(e.source)) musicianToBands.set(e.source, []);
        musicianToBands.get(e.source).push(e.target);
      }
      const score = new Map();
      for (const bs of musicianToBands.values()) {
        for (let i = 0; i < bs.length; i++) {
          for (let j = i + 1; j < bs.length; j++) {
            score.set(bs[i], (score.get(bs[i]) || 0) + 1);
            score.set(bs[j], (score.get(bs[j]) || 0) + 1);
          }
        }
      }
      for (const n of graph.nodes) {
        if (n.type === "band") n.importance = score.get(n.id) || 0;
      }
    }

    function setupScales() {
      const bands = RAW.nodes.filter(n => n.type === "band");
      const maxImp = d3.max(bands, n => n.importance) || 1;
      centralityScale = d3.scaleSqrt().domain([0, maxImp]).range([6, 26]);
      const maxPop = d3.max(bands, n => n.popularity || 0) || 1;
      // log scale because listener counts are extremely skewed
      popularityScale = d3.scaleLog().domain([1, maxPop]).range([6, 26]).clamp(true);
    }

    function bandRadius(d) {
      if (sizeMode === "popularity") {
        return popularityScale(Math.max(1, d.popularity || 1));
      }
      return centralityScale(d.importance || 0);
    }

    d3.selectAll("#toolbar button[data-mode]").on("click", function () {
      mode = this.dataset.mode;
      d3.selectAll("#toolbar button[data-mode]").classed("active", false);
      d3.select(this).classed("active", true);
      focusedId = null;
      render();
    });

    d3.selectAll("#toolbar button[data-size]").on("click", function () {
      if (this.disabled) return;
      sizeMode = this.dataset.size;
      d3.selectAll("#toolbar button[data-size]").classed("active", false);
      d3.select(this).classed("active", true);
      applySizes();
    });

    function applySizes() {
      if (!nodeSel) return;
      nodeSel.filter(d => d.type === "band").attr("r", d => bandRadius(d));
      labelSel.filter(d => d.type === "band")
        .attr("dy", d => bandRadius(d) + 12)
        .style("font-size", d => Math.max(10, Math.min(16, 9 + bandRadius(d) * 0.25)) + "px");
      simulation.force("collide", d3.forceCollide().radius(d => d.type === "band" ? bandRadius(d) + 4 : 6));
      simulation.alpha(0.2).restart();
    }

    function buildView() {
      const bandNodes = RAW.nodes.filter(n => n.type === "band").map(n => ({ ...n }));
      const musicianNodes = RAW.nodes.filter(n => n.type === "musician").map(n => ({ ...n }));

      if (mode === "full") {
        return { nodes: [...bandNodes, ...musicianNodes], links: RAW.edges.map(e => ({ ...e })) };
      }
      if (mode === "connectors") {
        const connectors = musicianNodes.filter(n => n.band_count >= 2);
        const ids = new Set(connectors.map(n => n.id));
        const links = RAW.edges.filter(e => ids.has(e.source)).map(e => ({ ...e }));
        return { nodes: [...bandNodes, ...connectors], links };
      }
      // bands: project edges between bands sharing musicians.
      const musicianToBands = new Map();
      for (const e of RAW.edges) {
        if (!musicianToBands.has(e.source)) musicianToBands.set(e.source, []);
        musicianToBands.get(e.source).push(e.target);
      }
      const pairWeight = new Map();
      for (const bs of musicianToBands.values()) {
        for (let i = 0; i < bs.length; i++) {
          for (let j = i + 1; j < bs.length; j++) {
            const [a, b] = [bs[i], bs[j]].sort();
            const k = `${a}|${b}`;
            pairWeight.set(k, (pairWeight.get(k) || 0) + 1);
          }
        }
      }
      const links = [];
      for (const [k, w] of pairWeight) {
        const [source, target] = k.split("|");
        links.push({ source, target, weight: w, kind: "projection" });
      }
      return { nodes: bandNodes, links };
    }

    // Build the ego subgraph (depth 2 for bipartite, 1 for band-only) of the focused node.
    function buildFocusedView() {
      const { nodes: allNodes, links: allLinks } = buildView();
      const adj = new Map();
      for (const l of allLinks) {
        const s = l.source.id || l.source;
        const t = l.target.id || l.target;
        if (!adj.has(s)) adj.set(s, []);
        if (!adj.has(t)) adj.set(t, []);
        adj.get(s).push(t);
        adj.get(t).push(s);
      }
      const depth = mode === "bands" ? 1 : 2;
      const visited = new Set([focusedId]);
      let frontier = new Set([focusedId]);
      for (let d = 0; d < depth; d++) {
        const next = new Set();
        for (const id of frontier) {
          for (const nb of (adj.get(id) || [])) {
            if (!visited.has(nb)) { visited.add(nb); next.add(nb); }
          }
        }
        frontier = next;
      }
      const nodes = allNodes.filter(n => visited.has(n.id));
      const links = allLinks.filter(l => {
        const s = l.source.id || l.source;
        const t = l.target.id || l.target;
        return visited.has(s) && visited.has(t);
      });
      return { nodes, links };
    }

    function render() {
      const { nodes, links } = focusedId ? buildFocusedView() : buildView();
      const focusSuffix = focusedId
        ? ` · focused on ${nodes.find(n => n.id === focusedId)?.name || ""}`
        : "";
      stats.text(`${mode} · ${sizeMode} · ${nodes.length} nodes · ${links.length} edges${focusSuffix}`);

      svg.selectAll("*").remove();
      if (simulation) simulation.stop();

      viewG = svg.append("g").attr("class", "zoom-target");
      svg.call(zoom.transform, d3.zoomIdentity);

      const linkDistance = mode === "bands" ? 90 : 60;
      const charge = mode === "full" ? -80 : -150;

      simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(linkDistance))
        .force("charge", d3.forceManyBody().strength(charge))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collide", d3.forceCollide().radius(d => d.type === "band" ? bandRadius(d) + 4 : 6));

      linkSel = viewG.append("g").selectAll("line")
        .data(links).enter().append("line")
        .attr("class", d => "link " + (d.kind === "projection" ? "projection" : (d.role || "member")))
        .attr("stroke-width", d => d.weight ? Math.sqrt(d.weight) * 1.5 : 1);

      nodeSel = viewG.append("g").selectAll("circle")
        .data(nodes).enter().append("circle")
        .attr("class", d => {
          const base = d.type === "band" ? "node-band" : "node-musician";
          return d.id === focusedId ? `${base} focused` : base;
        })
        .attr("r", d => d.type === "band" ? bandRadius(d) : 4)
        .on("mouseover", (event, d) => {
          let extra = d.type === "band"
            ? `<span style="color:#aaa">band</span>`
            : `<span style="color:#aaa">${d.band_count} band${d.band_count===1?'':'s'}</span>`;
          if (d.type === "band" && d.popularity) {
            extra += ` <span style="color:#aaa">· ${d.popularity.toLocaleString()} listeners</span>`;
          }
          tooltip.style("opacity", 1).html(`<b>${d.name}</b> ${extra}`);
        })
        .on("mousemove", event => {
          tooltip.style("left", (event.pageX + 12) + "px")
                 .style("top", (event.pageY + 12) + "px");
        })
        .on("mouseout", () => tooltip.style("opacity", 0))
        .on("click", (event, d) => {
          event.stopPropagation();
          focusedId = (focusedId === d.id) ? null : d.id;
          render();
        })
        .call(d3.drag()
          .on("start", (event, d) => {
            if (event.sourceEvent) event.sourceEvent.stopPropagation();
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
          })
          .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
          .on("end", (event, d) => {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null; d.fy = null;
          }));

      labelSel = viewG.append("g").selectAll("text")
        .data(nodes).enter().append("text")
        .attr("class", d => d.type === "band" ? "label-band" : "label-musician")
        .attr("dy", d => d.type === "band" ? bandRadius(d) + 12 : 14)
        .attr("text-anchor", "middle")
        .style("font-size", d => d.type === "band" ? Math.max(10, Math.min(16, 9 + bandRadius(d) * 0.25)) + "px" : null)
        .text(d => d.name);

      simulation.on("tick", () => {
        linkSel
          .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
        nodeSel.attr("cx", d => d.x).attr("cy", d => d.y);
        labelSel.attr("x", d => d.x).attr("y", d => d.y);
      });
    }

    // Click on empty SVG background clears focus.
    svg.on("click", () => {
      if (focusedId) { focusedId = null; render(); }
    });

    window.addEventListener("resize", () => {
      const w = window.innerWidth;
      const h = window.innerHeight - 50;
      svg.attr("width", w).attr("height", h);
      if (simulation) {
        simulation.force("center", d3.forceCenter(w / 2, h / 2));
        simulation.alpha(0.3).restart();
      }
    });
  </script>
</body>
</html>
