<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Seattle Grunge Band Network</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; background: #fafafa; }
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px 16px; background: #fff; border-bottom: 1px solid #ddd;
      display: flex; gap: 16px; align-items: center; z-index: 10;
    }
    #toolbar h1 { margin: 0; font-size: 14px; font-weight: 600; }
    #toolbar .modes { display: flex; gap: 4px; }
    #toolbar button {
      padding: 5px 10px; font-size: 12px; cursor: pointer;
      background: #fff; border: 1px solid #ccc; border-radius: 3px;
    }
    #toolbar button.active { background: #333; color: #fff; border-color: #333; }
    #toolbar .stats { margin-left: auto; font-size: 12px; color: #666; }
    svg { display: block; }
    .link { stroke-opacity: 0.5; }
    .link.member { stroke: #888; }
    .link.supporting { stroke: #c8a200; stroke-dasharray: 3,2; }
    .link.projection { stroke: #888; }
    .node-band { fill: steelblue; stroke: #fff; stroke-width: 1.5px; cursor: pointer; }
    .node-musician { fill: orange; stroke: #fff; stroke-width: 1px; cursor: pointer; }
    .label-band { font-size: 11px; font-weight: 600; pointer-events: none; }
    .label-musician { font-size: 9px; fill: #555; pointer-events: none; }
    .tooltip {
      position: absolute; padding: 6px 10px; background: rgba(0,0,0,0.8);
      color: #fff; font-size: 12px; border-radius: 3px; pointer-events: none;
      opacity: 0; transition: opacity 0.15s;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <h1>Seattle Grunge Band Network</h1>
    <div class="modes">
      <button data-mode="connectors" class="active">Connectors only</button>
      <button data-mode="full">Full bipartite</button>
      <button data-mode="bands">Band-only</button>
    </div>
    <span class="stats" id="stats"></span>
  </div>
  <div class="tooltip" id="tooltip"></div>
  <svg></svg>

  <script>
    const width = window.innerWidth;
    const height = window.innerHeight - 50;
    const svg = d3.select("svg").attr("width", width).attr("height", height);
    const tooltip = d3.select("#tooltip");
    const stats = d3.select("#stats");

    let RAW = null;       // { nodes, edges }
    let mode = "connectors";
    let simulation = null;
    let bandRadius = () => 12; // replaced after data loads

    d3.json("bands_network.json").then(data => {
      RAW = data;
      annotateBandImportance(RAW);
      const maxImportance = d3.max(RAW.nodes.filter(n => n.type === "band"), n => n.importance) || 1;
      bandRadius = d3.scaleSqrt().domain([0, maxImportance]).range([6, 26]);
      render();
    });

    // Importance = weighted degree in band-only projection: total count of
    // shared-musician relationships this band has with every other band.
    function annotateBandImportance(graph) {
      const musicianToBands = new Map();
      for (const e of graph.edges) {
        if (!musicianToBands.has(e.source)) musicianToBands.set(e.source, []);
        musicianToBands.get(e.source).push(e.target);
      }
      const score = new Map();
      for (const bs of musicianToBands.values()) {
        for (let i = 0; i < bs.length; i++) {
          for (let j = i + 1; j < bs.length; j++) {
            score.set(bs[i], (score.get(bs[i]) || 0) + 1);
            score.set(bs[j], (score.get(bs[j]) || 0) + 1);
          }
        }
      }
      for (const n of graph.nodes) {
        if (n.type === "band") n.importance = score.get(n.id) || 0;
      }
    }

    d3.selectAll("#toolbar button[data-mode]").on("click", function () {
      mode = this.dataset.mode;
      d3.selectAll("#toolbar button[data-mode]").classed("active", false);
      d3.select(this).classed("active", true);
      render();
    });

    // Build the {nodes, links} for the active mode.
    function buildView() {
      const bandNodes = RAW.nodes.filter(n => n.type === "band").map(n => ({ ...n }));
      const musicianNodes = RAW.nodes.filter(n => n.type === "musician").map(n => ({ ...n }));

      if (mode === "full") {
        const nodes = [...bandNodes, ...musicianNodes];
        const links = RAW.edges.map(e => ({ ...e }));
        return { nodes, links };
      }

      if (mode === "connectors") {
        const connectors = musicianNodes.filter(n => n.band_count >= 2);
        const ids = new Set(connectors.map(n => n.id));
        const nodes = [...bandNodes, ...connectors];
        const links = RAW.edges
          .filter(e => ids.has(e.source))
          .map(e => ({ ...e }));
        return { nodes, links };
      }

      // mode === "bands": project edges between bands sharing musicians.
      // For each musician, every pair of their bands gets +1 weight.
      const musicianToBands = new Map();
      for (const e of RAW.edges) {
        if (!musicianToBands.has(e.source)) musicianToBands.set(e.source, []);
        musicianToBands.get(e.source).push(e.target);
      }
      const pairWeight = new Map(); // "a|b" (a<b) -> weight
      for (const bs of musicianToBands.values()) {
        for (let i = 0; i < bs.length; i++) {
          for (let j = i + 1; j < bs.length; j++) {
            const [a, b] = [bs[i], bs[j]].sort();
            const k = `${a}|${b}`;
            pairWeight.set(k, (pairWeight.get(k) || 0) + 1);
          }
        }
      }
      const links = [];
      for (const [k, w] of pairWeight) {
        const [source, target] = k.split("|");
        links.push({ source, target, weight: w, kind: "projection" });
      }
      return { nodes: bandNodes, links };
    }

    function render() {
      const { nodes, links } = buildView();
      stats.text(`${mode} · ${nodes.length} nodes · ${links.length} edges`);

      svg.selectAll("*").remove();
      if (simulation) simulation.stop();

      const linkDistance = mode === "bands" ? 90 : 60;
      const charge = mode === "full" ? -80 : -150;

      simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(linkDistance))
        .force("charge", d3.forceManyBody().strength(charge))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collide", d3.forceCollide().radius(d => d.type === "band" ? bandRadius(d.importance) + 4 : 6));

      const link = svg.append("g").selectAll("line")
        .data(links).enter().append("line")
        .attr("class", d => "link " + (d.kind === "projection" ? "projection" : (d.role || "member")))
        .attr("stroke-width", d => d.weight ? Math.sqrt(d.weight) * 1.5 : 1);

      const node = svg.append("g").selectAll("circle")
        .data(nodes).enter().append("circle")
        .attr("class", d => d.type === "band" ? "node-band" : "node-musician")
        .attr("r", d => d.type === "band" ? bandRadius(d.importance) : 4)
        .on("mouseover", (event, d) => {
          tooltip.style("opacity", 1)
            .html(d.type === "band"
              ? `<b>${d.name}</b> <span style="color:#aaa">band</span>`
              : `<b>${d.name}</b> <span style="color:#aaa">${d.band_count} band${d.band_count===1?'':'s'}</span>`);
        })
        .on("mousemove", event => {
          tooltip.style("left", (event.pageX + 12) + "px")
                 .style("top", (event.pageY + 12) + "px");
        })
        .on("mouseout", () => tooltip.style("opacity", 0))
        .call(d3.drag()
          .on("start", (event, d) => {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
          })
          .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
          .on("end", (event, d) => {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null; d.fy = null;
          }));

      const label = svg.append("g").selectAll("text")
        .data(nodes).enter().append("text")
        .attr("class", d => d.type === "band" ? "label-band" : "label-musician")
        .attr("dy", d => d.type === "band" ? bandRadius(d.importance) + 12 : 14)
        .attr("text-anchor", "middle")
        .style("font-size", d => d.type === "band" ? Math.max(10, Math.min(16, 9 + bandRadius(d.importance) * 0.25)) + "px" : null)
        .text(d => d.name);

      simulation.on("tick", () => {
        link
          .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
        node.attr("cx", d => d.x).attr("cy", d => d.y);
        label.attr("x", d => d.x).attr("y", d => d.y);
      });
    }

    window.addEventListener("resize", () => {
      const w = window.innerWidth;
      const h = window.innerHeight - 50;
      svg.attr("width", w).attr("height", h);
      if (simulation) {
        simulation.force("center", d3.forceCenter(w / 2, h / 2));
        simulation.alpha(0.3).restart();
      }
    });
  </script>
</body>
</html>
