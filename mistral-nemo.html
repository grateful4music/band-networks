<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Force Directed Graph</title>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    svg { width: 800px; height: 600px; }
    .link { stroke: #999; stroke-opacity: 0.6; }
    .node { fill: steelblue; }
  </style>
</head>
<body>

<script src="https://d3js.org/d3.v5.min.js"></script>
<script>

// Set up the simulation
const width = 800;
const height = 600;

const svg = d3.select('body').append('svg')
    .attr('width', width)
    .attr('height', height);

const nodes = Array.from({ length: 10 }, (_, i) => ({ id: i, x: Math.random() * width, y: Math.random() * height }));
const links = [];

// Generate random links between nodes
for (let node of nodes) {
  const connectedNodes = nodes.filter(() => Math.random() < 0.5);
  for (let connectedNode of connectedNodes) {
    if (connectedNode.id !== node.id && !links.some(link => link.source.id === node.id && link.target.id === connectedNode.id)) {
      links.push({ source: node, target: connectedNode });
    }
  }
}

const simulation = d3.forceSimulation(nodes)
  .force('x', d3.forceX(width / 2).strength(0.1))
  .force('y', d3.forceY(height / 2).strength(0.1))
  .force('links', d3.forceLink(links).id(node => node.id).iterations(1).strength(0.5));

// Add nodes and links to the graph
const link = svg.selectAll('.link')
    .data(links)
    .enter().append('line')
    .attr('class', 'link');

const node = svg.selectAll('.node')
    .data(nodes)
    .enter().append('circle')
    .attr('class', 'node')
    .attr('r', 5);

node.call(d3.drag()
    .on('start', dragstarted)
    .on('drag', dragged)
    .on('end', dragended));

simulation.on('tick', ticked);

// Initialize the graph
ticked();

// Update the graph on simulation tick
function ticked() {
  link.attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);

  node.attr('cx', d => d.x)
      .attr('cy', d => d.y);
}

// Drag functions
function dragstarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.7).restart();
  d.fx = d.x;
  d.fy = d.y;
}

function dragged(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}

function dragended(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = event.x;
  d.fy = event.y;
}

</script>

</body>
</html>
